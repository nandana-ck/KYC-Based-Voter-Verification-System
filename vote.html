<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #22c55e;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        .msg {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Cast Your Vote</h2>

    <form method="POST">
        <input type="text" name="roll" placeholder="Enter Roll Number" required>
        <button type="submit">Vote</button>
    </form>

    {% if message %}
        <div class="msg">{{ message }}</div>
    {% endif %}
</div>

</body>
</html>
